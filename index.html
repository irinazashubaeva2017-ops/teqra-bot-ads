<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEQRA Ads</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="container">
        <h1 id="brand">TEQRA <span>ADS</span></h1>
        <div class="user-card">
            <p>Привет, <span id="user-name">Партнер</span>!</p>
        </div>
        <div class="menu">
            <button class="btn" onclick="alert('Скоро: Аналитика')">📊 Аналитика</button>
            <button class="btn" onclick="alert('Скоро: Каталог')">📢 Каталог каналов</button>
            <button class="btn" onclick="alert('Скоро: Генератор')">✍️ Генератор текста</button>
        </div>
        <button onclick="window.Telegram.WebApp.close()" class="btn-close">Закрыть</button>
    </div>
    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        if (tg.initDataUnsafe.user) {
            document.getElementById("user-name").innerText = tg.initDataUnsafe.user.first_name;
        }
    </script>
</body>
</html>
